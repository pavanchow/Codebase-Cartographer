<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <div style="display:grid; grid-template-columns:repeat(10, 1fr); gap:6px;">
    <div><div class="swatch" style="height:56px; background:#FFFFFF;"></div><div class="name" style="margin-top:6px;">0</div></div>
    <div><div class="swatch" style="height:56px; background:#F9FAFB;"></div><div class="name" style="margin-top:6px;">50</div></div>
    <div><div class="swatch" style="height:56px; background:#F3F4F6;"></div><div class="name" style="margin-top:6px;">100</div></div>
    <div><div class="swatch" style="height:56px; background:#ECEEF2;"></div><div class="name" style="margin-top:6px;">150</div></div>
    <div><div class="swatch" style="height:56px; background:#E5E7EB;"></div><div class="name" style="margin-top:6px;">200</div></div>
    <div><div class="swatch" style="height:56px; background:#D1D5DB;"></div><div class="name" style="margin-top:6px;">300</div></div>
    <div><div class="swatch" style="height:56px; background:#9CA3AF;"></div><div class="name" style="margin-top:6px;">400</div></div>
    <div><div class="swatch" style="height:56px; background:#6B7280;"></div><div class="name" style="margin-top:6px; color:#fff;">500</div></div>
    <div><div class="swatch" style="height:56px; background:#374151;"></div><div class="name" style="margin-top:6px;">700</div></div>
    <div><div class="swatch" style="height:56px; background:#111827;"></div><div class="name" style="margin-top:6px;">900</div></div>
  </div>
  <div class="meta" style="margin-top:14px;">--gray-* · canvas / panels / borders / text. never pure black.</div>
</div></body></html>
