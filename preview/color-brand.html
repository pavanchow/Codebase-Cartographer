<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <div style="display:grid; grid-template-columns:repeat(9, 1fr); gap:8px;">
    <!-- 50 100 200 300 400 500 600 700 800 900 -->
    <div><div class="swatch" style="height:60px; background:#EEF2FF;"></div><div class="name" style="margin-top:6px;">50</div><div class="val">#EEF2FF</div></div>
    <div><div class="swatch" style="height:60px; background:#E0E7FF;"></div><div class="name" style="margin-top:6px;">100</div><div class="val">#E0E7FF</div></div>
    <div><div class="swatch" style="height:60px; background:#C7D2FE;"></div><div class="name" style="margin-top:6px;">200</div><div class="val">#C7D2FE</div></div>
    <div><div class="swatch" style="height:60px; background:#A5B4FC;"></div><div class="name" style="margin-top:6px;">300</div><div class="val">#A5B4FC</div></div>
    <div><div class="swatch" style="height:60px; background:#7C8CF8;"></div><div class="name" style="margin-top:6px;">400</div><div class="val">#7C8CF8</div></div>
    <div><div class="swatch" style="height:60px; background:#4F5FE8;"></div><div class="name" style="margin-top:6px;">500</div><div class="val">#4F5FE8</div></div>
    <div><div class="swatch" style="height:60px; background:#3B4BDB; outline:2px solid #3B4BDB33; outline-offset:1px;"></div><div class="name" style="margin-top:6px; color:#3B4BDB; font-weight:600;">600 ●</div><div class="val">#3B4BDB</div></div>
    <div><div class="swatch" style="height:60px; background:#2F3BB8;"></div><div class="name" style="margin-top:6px;">700</div><div class="val">#2F3BB8</div></div>
    <div><div class="swatch" style="height:60px; background:#1E2570;"></div><div class="name" style="margin-top:6px;">900</div><div class="val">#1E2570</div></div>
  </div>
  <div class="meta" style="margin-top:14px;">--brand-* · 600 is primary (active nodes, blast radius, focus)</div>
</div></body></html>
