<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <div style="display:flex; gap:24px; align-items:flex-end;">
    <!-- 4 8 12 16 24 32 48 -->
    <div style="text-align:center;"><div style="width:4px; height:4px; background:#3B4BDB;"></div><div class="val" style="margin-top:6px;">4</div></div>
    <div style="text-align:center;"><div style="width:8px; height:8px; background:#3B4BDB;"></div><div class="val" style="margin-top:6px;">8</div></div>
    <div style="text-align:center;"><div style="width:12px; height:12px; background:#3B4BDB;"></div><div class="val" style="margin-top:6px;">12</div></div>
    <div style="text-align:center;"><div style="width:16px; height:16px; background:#3B4BDB;"></div><div class="val" style="margin-top:6px;">16</div></div>
    <div style="text-align:center;"><div style="width:24px; height:24px; background:#3B4BDB;"></div><div class="val" style="margin-top:6px;">24</div></div>
    <div style="text-align:center;"><div style="width:32px; height:32px; background:#3B4BDB;"></div><div class="val" style="margin-top:6px;">32</div></div>
    <div style="text-align:center;"><div style="width:48px; height:48px; background:#3B4BDB;"></div><div class="val" style="margin-top:6px;">48</div></div>
    <div style="text-align:center;"><div style="width:64px; height:64px; background:#3B4BDB;"></div><div class="val" style="margin-top:6px;">64</div></div>
  </div>
  <div class="meta" style="margin-top:14px;">--space-1 … --space-16 · 4-px base grid, never half-values</div>
</div></body></html>
