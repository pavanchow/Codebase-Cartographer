<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <div style="display:grid; grid-template-columns:auto 1fr; gap:10px 14px; align-items:center;">
    <div style="font-family:'JetBrains Mono'; font-size:11px; color:#6B7280;">fast · 120ms</div>
    <div style="height:4px; background:#F3F4F6; border-radius:999px; overflow:hidden;"><div style="height:100%; width:22%; background:#3B4BDB;"></div></div>
    <div style="font-family:'JetBrains Mono'; font-size:11px; color:#6B7280;">base · 180ms</div>
    <div style="height:4px; background:#F3F4F6; border-radius:999px; overflow:hidden;"><div style="height:100%; width:34%; background:#3B4BDB;"></div></div>
    <div style="font-family:'JetBrains Mono'; font-size:11px; color:#6B7280;">slow · 260ms</div>
    <div style="height:4px; background:#F3F4F6; border-radius:999px; overflow:hidden;"><div style="height:100%; width:50%; background:#3B4BDB;"></div></div>
  </div>
  <div style="margin-top:14px; font-family:'JetBrains Mono'; font-size:11px; color:#374151; line-height:1.7;">
    <div>standard &nbsp;&nbsp;<span style="color:#6B7280;">cubic-bezier(0.2, 0, 0, 1)</span></div>
    <div>emphasized <span style="color:#6B7280;">cubic-bezier(0.3, 0, 0, 1)</span></div>
    <div style="color:#B91C1C;">no bounce · no overshoot · no spring</div>
  </div>
</div></body></html>
