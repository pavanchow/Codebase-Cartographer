<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card" style="background:#F9FAFB;">
  <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:14px;">
    <div style="text-align:center;"><div style="width:100%; height:72px; background:#fff; border-radius:6px; box-shadow:0 1px 0 0 rgba(17,24,39,0.04);"></div><div class="name" style="margin-top:8px;">xs</div><div class="val">hairline</div></div>
    <div style="text-align:center;"><div style="width:100%; height:72px; background:#fff; border-radius:6px; box-shadow:0 1px 2px 0 rgba(17,24,39,0.06), 0 0 0 1px rgba(17,24,39,0.04);"></div><div class="name" style="margin-top:8px;">sm</div><div class="val">cards</div></div>
    <div style="text-align:center;"><div style="width:100%; height:72px; background:#fff; border-radius:6px; box-shadow:0 2px 4px -1px rgba(17,24,39,0.06), 0 4px 8px -2px rgba(17,24,39,0.06);"></div><div class="name" style="margin-top:8px;">md</div><div class="val">popovers</div></div>
    <div style="text-align:center;"><div style="width:100%; height:72px; background:#fff; border-radius:6px; box-shadow:0 8px 24px -4px rgba(17,24,39,0.10), 0 2px 6px -1px rgba(17,24,39,0.06);"></div><div class="name" style="margin-top:8px;">lg</div><div class="val">modals</div></div>
  </div>
  <div class="meta" style="margin-top:14px;">lines &gt; shadows · no colored or multi-layer depth</div>
</div></body></html>
