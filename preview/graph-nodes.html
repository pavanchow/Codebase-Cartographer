<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <!-- graph-style node examples with blast-radius highlight -->
  <svg viewBox="0 0 620 180" width="100%" height="180">
    <!-- edges -->
    <g stroke="#E5E7EB" stroke-width="1.5">
      <line x1="90" y1="90" x2="250" y2="50"/>
      <line x1="90" y1="90" x2="250" y2="130"/>
      <line x1="250" y1="50" x2="410" y2="50"/>
      <line x1="250" y1="130" x2="410" y2="130"/>
      <line x1="410" y1="50" x2="560" y2="90"/>
      <line x1="410" y1="130" x2="560" y2="90"/>
    </g>
    <!-- highlighted blast-radius edges -->
    <g stroke="#3B4BDB" stroke-width="2">
      <line x1="90" y1="90" x2="250" y2="50"/>
      <line x1="250" y1="50" x2="410" y2="50"/>
    </g>
    <!-- nodes -->
    <g font-family="JetBrains Mono, monospace" font-size="10" fill="#FFFFFF" text-anchor="middle">
      <g><rect x="60" y="72" width="60" height="36" rx="4" fill="#3B4BDB"/><text x="90" y="94">session</text></g>
      <g><rect x="220" y="32" width="60" height="36" rx="4" fill="#3B4BDB"/><text x="250" y="54">users</text></g>
      <g><rect x="220" y="112" width="60" height="36" rx="4" fill="#0EA5E9"/><text x="250" y="134">api</text></g>
      <g><rect x="380" y="32" width="60" height="36" rx="4" fill="#3B4BDB"/><text x="410" y="54">billing</text></g>
      <g><rect x="380" y="112" width="60" height="36" rx="4" fill="#8B5CF6"/><text x="410" y="134">data</text></g>
      <g><rect x="530" y="72" width="60" height="36" rx="4" fill="#9CA3AF"/><text x="560" y="94">stripe</text></g>
    </g>
  </svg>
  <div class="meta" style="margin-top:8px;">4-px rect nodes · mono labels · cobalt blast-radius highlight path</div>
</div></body></html>
