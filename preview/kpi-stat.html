<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <div style="display:flex; gap:10px; margin-bottom:10px;">
    <div style="flex:1; background:#F9FAFB; border:1px solid #E5E7EB; border-radius:6px; padding:10px 12px;">
      <div style="font:600 11px Inter; letter-spacing:0.04em; text-transform:uppercase; color:#4B5563;">Modules</div>
      <div style="font:600 20px 'JetBrains Mono'; color:#111827; margin-top:2px;">247</div>

    </div>
    <div style="flex:1; background:#F9FAFB; border:1px solid #E5E7EB; border-radius:6px; padding:10px 12px;">

      <div style="font:600 20px 'JetBrains Mono'; color:#111827; margin-top:2px;">1,204</div>
      <div style="font:500 11px 'JetBrains Mono'; color:#B45309; margin-top:2px;">↑ 52 drift</div>
    </div>
    <div style="flex:1; background:#F9FAFB; border:1px solid #E5E7EB; border-radius:6px; padding:10px 12px;">
      <div style="font:600 11px Inter; letter-spacing:0.04em; text-transform:uppercase; color:#4B5563;">Blast radius</div>
      <div style="font:600 20px 'JetBrains Mono'; color:#3B4BDB; margin-top:2px;">68%</div>
      <div style="font:500 11px 'JetBrains Mono'; color:#6B7280; margin-top:2px;">of repo</div>
    </div>
  </div>
  <div class="meta">mono numbers · uppercase labels · semantic delta colors</div>
</div></body></html>
