<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <div style="display:flex; flex-wrap:wrap; gap:8px; align-items:center;">
    <!-- status badges -->
    <span style="display:inline-flex; align-items:center; gap:6px; padding:2px 8px; font:500 11px Inter; border-radius:999px; background:#ECFDF5; color:#047857; border:1px solid #A7F3D0;"><span style="width:6px;height:6px;background:#10B981;border-radius:999px;"></span>Healthy</span>
    <span style="display:inline-flex; align-items:center; gap:6px; padding:2px 8px; font:500 11px Inter; border-radius:999px; background:#FFFBEB; color:#B45309; border:1px solid #FDE68A;"><span style="width:6px;height:6px;background:#F59E0B;border-radius:999px;"></span>Drift</span>
    <span style="display:inline-flex; align-items:center; gap:6px; padding:2px 8px; font:500 11px Inter; border-radius:999px; background:#FEF2F2; color:#B91C1C; border:1px solid #FECACA;"><span style="width:6px;height:6px;background:#EF4444;border-radius:999px;"></span>Deprecated</span>
    <span style="display:inline-flex; align-items:center; gap:6px; padding:2px 8px; font:500 11px Inter; border-radius:999px; background:#EEF2FF; color:#2F3BB8; border:1px solid #C7D2FE;"><span style="width:6px;height:6px;background:#3B4BDB;border-radius:999px;"></span>Selected</span>
    <!-- mono count -->
    <span style="display:inline-flex; align-items:center; padding:2px 8px; font:500 11px 'JetBrains Mono'; border-radius:4px; background:#F3F4F6; color:#374151; border:1px solid #E5E7EB;">247 modules</span>
    <span style="display:inline-flex; align-items:center; padding:2px 8px; font:500 11px 'JetBrains Mono'; border-radius:4px; background:#EEF2FF; color:#2F3BB8; border:1px solid #C7D2FE;">↑ 12 callers</span>
    <span style="display:inline-flex; align-items:center; padding:2px 8px; font:500 11px 'JetBrains Mono'; border-radius:4px; background:#F3F4F6; color:#374151; border:1px solid #E5E7EB;">↓ 3 callees</span>
  </div>
  <div style="margin-top:12px; display:flex; gap:8px; flex-wrap:wrap;">
    <!-- filter chips -->
    <span style="display:inline-flex; align-items:center; gap:6px; padding:4px 10px; font:500 12px Inter; border-radius:999px; background:#EEF2FF; color:#2F3BB8; border:1px solid #C7D2FE;">type: service ×</span>
    <span style="display:inline-flex; align-items:center; gap:6px; padding:4px 10px; font:500 12px Inter; border-radius:999px; background:#fff; color:#374151; border:1px solid #D1D5DB;">+ add filter</span>
  </div>
  <div class="meta" style="margin-top:14px;">status pills · mono metric chips · filter chips</div>
</div></body></html>
