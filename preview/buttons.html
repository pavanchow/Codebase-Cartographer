<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
    <!-- primary -->
    <button style="background:#3B4BDB; color:#fff; border:0; border-radius:4px; padding:8px 14px; font:500 13px Inter, sans-serif; cursor:pointer;">Run analysis</button>
    <button style="background:#2F3BB8; color:#fff; border:0; border-radius:4px; padding:8px 14px; font:500 13px Inter, sans-serif; cursor:pointer;">Run analysis</button>
    <!-- secondary -->
    <button style="background:#fff; color:#1F2937; border:1px solid #D1D5DB; border-radius:4px; padding:7px 13px; font:500 13px Inter, sans-serif; cursor:pointer;">Cancel</button>
    <!-- ghost -->
    <button style="background:transparent; color:#3B4BDB; border:0; border-radius:4px; padding:8px 12px; font:500 13px Inter, sans-serif; cursor:pointer;">View docs</button>
    <!-- danger -->
    <button style="background:#fff; color:#B91C1C; border:1px solid #FECACA; border-radius:4px; padding:7px 13px; font:500 13px Inter, sans-serif; cursor:pointer;">Delete index</button>
    <!-- disabled -->
    <button disabled style="background:#F3F4F6; color:#9CA3AF; border:1px solid #E5E7EB; border-radius:4px; padding:7px 13px; font:500 13px Inter, sans-serif;">Processing…</button>
  </div>
  <div style="display:flex; gap:10px; margin-top:12px; align-items:center;">
    <button style="background:#3B4BDB; color:#fff; border:0; border-radius:4px; padding:6px 10px; font:500 12px Inter, sans-serif;">sm</button>
    <button style="background:#3B4BDB; color:#fff; border:0; border-radius:4px; padding:8px 14px; font:500 13px Inter, sans-serif;">md</button>
    <button style="background:#3B4BDB; color:#fff; border:0; border-radius:6px; padding:10px 18px; font:500 14px Inter, sans-serif;">lg</button>
  </div>
  <div class="meta" style="margin-top:14px;">primary · primary:hover · secondary · ghost · danger · disabled · sm/md/lg</div>
</div></body></html>
