<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script></head>
<body><div class="card">
  <div style="display:grid; grid-template-columns:repeat(8,1fr); gap:14px; color:#4B5563;">
    <div style="text-align:center;"><i data-lucide="box" style="width:20px;height:20px;"></i><div class="val" style="margin-top:6px;">box</div></div>
    <div style="text-align:center;"><i data-lucide="server" style="width:20px;height:20px;"></i><div class="val" style="margin-top:6px;">server</div></div>
    <div style="text-align:center;"><i data-lucide="database" style="width:20px;height:20px;"></i><div class="val" style="margin-top:6px;">database</div></div>
    <div style="text-align:center;"><i data-lucide="radar" style="width:20px;height:20px;color:#3B4BDB;"></i><div class="val" style="margin-top:6px;">radar</div></div>
    <div style="text-align:center;"><i data-lucide="search" style="width:20px;height:20px;"></i><div class="val" style="margin-top:6px;">search</div></div>
    <div style="text-align:center;"><i data-lucide="sliders-horizontal" style="width:20px;height:20px;"></i><div class="val" style="margin-top:6px;">filter</div></div>
    <div style="text-align:center;"><i data-lucide="file-text" style="width:20px;height:20px;"></i><div class="val" style="margin-top:6px;">docs</div></div>
    <div style="text-align:center;"><i data-lucide="git-commit-horizontal" style="width:20px;height:20px;"></i><div class="val" style="margin-top:6px;">commit</div></div>
    <div style="text-align:center;"><i data-lucide="users" style="width:20px;height:20px;"></i><div class="val" style="margin-top:6px;">users</div></div>
    <div style="text-align:center;"><i data-lucide="external-link" style="width:20px;height:20px;"></i><div class="val" style="margin-top:6px;">external</div></div>
    <div style="text-align:center;"><i data-lucide="arrow-down-to-line" style="width:20px;height:20px;"></i><div class="val" style="margin-top:6px;">in</div></div>
    <div style="text-align:center;"><i data-lucide="arrow-up-from-line" style="width:20px;height:20px;"></i><div class="val" style="margin-top:6px;">out</div></div>
    <div style="text-align:center;"><i data-lucide="settings" style="width:20px;height:20px;"></i><div class="val" style="margin-top:6px;">settings</div></div>
    <div style="text-align:center;"><i data-lucide="archive" style="width:20px;height:20px;"></i><div class="val" style="margin-top:6px;">archive</div></div>
    <div style="text-align:center;"><i data-lucide="play" style="width:20px;height:20px;"></i><div class="val" style="margin-top:6px;">run</div></div>
    <div style="text-align:center;"><i data-lucide="download" style="width:20px;height:20px;"></i><div class="val" style="margin-top:6px;">export</div></div>
  </div>
  <div class="meta" style="margin-top:14px;">Lucide 1.75 stroke · inherits currentColor · 14/16/20/24 px</div>
  <script>lucide.createIcons();</script>
</div></body></html>
