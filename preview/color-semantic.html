<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:12px;">
    <!-- success -->
    <div>
      <div style="display:flex; gap:4px; height:56px;">
        <div style="flex:1; background:#ECFDF5; border:1px solid #E5E7EB; border-radius:4px 0 0 4px;"></div>
        <div style="flex:1; background:#10B981;"></div>
        <div style="flex:1; background:#047857; border-radius:0 4px 4px 0;"></div>
      </div>
      <div class="name" style="margin-top:8px;">Success</div>
      <div class="val">#10B981</div>
    </div>
    <!-- warning -->
    <div>
      <div style="display:flex; gap:4px; height:56px;">
        <div style="flex:1; background:#FFFBEB; border:1px solid #E5E7EB; border-radius:4px 0 0 4px;"></div>
        <div style="flex:1; background:#F59E0B;"></div>
        <div style="flex:1; background:#B45309; border-radius:0 4px 4px 0;"></div>
      </div>
      <div class="name" style="margin-top:8px;">Warning</div>
      <div class="val">#F59E0B</div>
    </div>
    <!-- danger -->
    <div>
      <div style="display:flex; gap:4px; height:56px;">
        <div style="flex:1; background:#FEF2F2; border:1px solid #E5E7EB; border-radius:4px 0 0 4px;"></div>
        <div style="flex:1; background:#EF4444;"></div>
        <div style="flex:1; background:#B91C1C; border-radius:0 4px 4px 0;"></div>
      </div>
      <div class="name" style="margin-top:8px;">Danger</div>
      <div class="val">#EF4444</div>
    </div>
    <!-- info -->
    <div>
      <div style="display:flex; gap:4px; height:56px;">
        <div style="flex:1; background:#EFF6FF; border:1px solid #E5E7EB; border-radius:4px 0 0 4px;"></div>
        <div style="flex:1; background:#3B82F6;"></div>
        <div style="flex:1; background:#1D4ED8; border-radius:0 4px 4px 0;"></div>
      </div>
      <div class="name" style="margin-top:8px;">Info</div>
      <div class="val">#3B82F6</div>
    </div>
  </div>
  <div class="meta" style="margin-top:14px;">tint 50 · base 500 · text-on-surface 700</div>
</div></body></html>
