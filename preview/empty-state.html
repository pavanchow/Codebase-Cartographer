<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <div style="background:#F9FAFB; border:1px solid #E5E7EB; border-radius:6px; overflow:hidden;">
    <div style="padding:8px 12px; background:#fff; border-bottom:1px solid #E5E7EB; display:flex; align-items:center; gap:8px;">
      <div style="width:10px; height:10px; border-radius:999px; background:#10B981;"></div>
      <div style="font:500 11px Inter; letter-spacing:0.04em; text-transform:uppercase; color:#4B5563;">Empty state</div>
    </div>
    <div style="padding:20px; text-align:center;">
      <div style="font:500 13px Inter; color:#1F2937;">No modules match these filters.</div>
      <div style="font:400 12px Inter; color:#6B7280; margin-top:4px;">Try removing a filter or widening the depth.</div>
      <button style="margin-top:10px; background:transparent; color:#3B4BDB; border:0; padding:4px 8px; font:500 12px Inter; cursor:pointer;">Clear all filters</button>
    </div>
  </div>
  <div class="meta" style="margin-top:12px;">declarative · no exclamation marks · inline recovery action</div>
</div></body></html>
