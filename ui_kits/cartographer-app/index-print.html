<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Cartographer — acme-monorepo (print)</title>
  <link rel="stylesheet" href="app.css"/>
  <link rel="icon" href="../../assets/logo-mark.svg"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html, body { background:#fff; }
    /* Screen: show a letter-ish page frame so user sees exactly what prints */
    body { margin: 0; padding: 24px; display:flex; flex-direction:column; gap: 24px; align-items:center; }
    .page {
      width: 1440px;
      height: 810px;
      border: 1px solid #E5E7EB;
      box-shadow: 0 1px 2px rgba(17,24,39,0.06);
      background: #fff;
      overflow: hidden;
      position: relative;
    }
    .page .app { height: 100%; }
    .page-title {
      font: 600 11px 'Inter', system-ui, sans-serif;
      letter-spacing: 0.06em; text-transform: uppercase; color:#6B7280;
      width: 1440px; display:flex; justify-content:space-between; align-items:center;
    }
    .page-title .meta { font-family: 'JetBrains Mono', monospace; text-transform:none; letter-spacing:0; }

    @page { size: 1440px 810px; margin: 0; }
    @media print {
      html, body { background:#fff; }
      body { padding: 0; margin: 0; gap: 0; }
      .page-title { display: none; }
      .page {
        width: 1440px; height: 810px;
        border: 0; box-shadow: none;
        break-after: page; page-break-after: always;
      }
      .page:last-child { break-after: auto; page-break-after: auto; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      /* disable any transitions/hover */
      * { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>
  <div class="page-title"><span>Cartographer · Map</span><span class="meta">acme-monorepo · branch main @ a1b2c3d</span></div>
  <div class="page"><div id="map-root"></div></div>

  <div class="page-title"><span>Cartographer · Inspect</span><span class="meta">247 modules · 1,204 edges</span></div>
  <div class="page"><div id="inspect-root"></div></div>

  <div class="page-title"><span>Cartographer · Docs</span><span class="meta">auto-generated · last built 2h ago</span></div>
  <div class="page"><div id="docs-root"></div></div>

  <script type="text/babel" src="TopBar.jsx"></script>
  <script type="text/babel" src="NavRail.jsx"></script>
  <script type="text/babel" src="GraphCanvas.jsx"></script>
  <script type="text/babel" src="InspectPanel.jsx"></script>
  <script type="text/babel" src="ModulesTable.jsx"></script>
  <script type="text/babel" src="DocsView.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function Shell({ mode, children }) {
      const [selected, setSelected] = useState('auth/session');
      useEffect(()=>{ if (window.lucide) window.lucide.createIcons(); });
      return (
        <div className="app">
          <TopBar mode={mode} setMode={()=>{}}/>
          <NavRail active={mode} setActive={()=>{}}/>
          <main className="main">{typeof children === 'function' ? children({selected, setSelected}) : children}</main>
          <InspectPanel selected={selected}/>
          <footer className="statusbar">
            <span className="dot"></span>
            <span>index fresh · built 2h ago</span>
            <span>·</span>
            <span>247 modules</span>
            <span>·</span>
            <span>1,204 edges</span>
            <div style={{flex:1}}/>
            <span>branch main @ a1b2c3d</span>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('map-root')).render(
      <Shell mode="map">{({selected, setSelected}) =>
        <GraphCanvas selected={selected} setSelected={setSelected} filters={{onlyBlast:false}}/>
      }</Shell>
    );
    ReactDOM.createRoot(document.getElementById('inspect-root')).render(
      <Shell mode="inspect">{({selected, setSelected}) =>
        <ModulesTable selected={selected} setSelected={setSelected}/>
      }</Shell>
    );
    ReactDOM.createRoot(document.getElementById('docs-root')).render(
      <Shell mode="docs"><DocsView/></Shell>
    );

    // auto-print once everything is ready
    (async () => {
      try { await document.fonts.ready; } catch(e) {}
      // wait for lucide icons to materialize
      await new Promise(r => setTimeout(r, 800));
      if (window.lucide) window.lucide.createIcons();
      await new Promise(r => setTimeout(r, 500));
      window.print();
    })();
  </script>
</body>
</html>
