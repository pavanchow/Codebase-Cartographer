name: Deploy Cartographer landing to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6 # Updated from v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5 # Updated from v3
        with:
          # IMPORTANT: Change "." to your folder name if your HTML isn't in the root
          path: . 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5 # Updated from v4
